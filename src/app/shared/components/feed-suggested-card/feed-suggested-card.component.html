<div class="flex items-center justify-between my-4">
    <!-- User Info -->
    <div class="flex items-center gap-3 overflow-hidden">
        <!-- Avatar -->
        <img [src]="suggestedFollower.photo" class="w-12 h-12 rounded-full object-cover" alt="Suggested Follower Photo" />
        <!-- Name + Username -->
        <div class="flex flex-col">
            <h3 class="font-semibold text-gray-800">
                {{suggestedFollower.name}}
            </h3>
            <span class="text-sm text-gray-500">
                @{{suggestedFollower.username}}
            </span>
        </div>
    </div>
    <!-- Follow Button -->
    <button [class.bg-green-500]="isFollowed" (click)="onFollowingUser(suggestedFollower._id)"
        class="flex items-center gap-2 bg-blue-50 text-blue-600 px-4 py-2 rounded-full text-sm font-medium hover:bg-blue-100 transition">
        @if(!isFollowed){
        @if (isLoading) {
        Following <i class="fas fa-spinner fa-spin text-sm"></i>
        }@else {
        <i class="fa-solid fa-user-plus text-sm"></i>
        Follow
        }
        }@else {
        Followed
        }
    </button>
</div>
