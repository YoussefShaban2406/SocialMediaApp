<div class="flex gap-3 w-full">
    <!-- Avatar -->
    <img [src]="userData.photo" class="w-10 h-10 rounded-full" />

    <!-- Input Box -->
    <div class="flex-1 w-full border border-gray-300 rounded-xl p-3 bg-white shadow-sm">
        <form [formGroup]="addCommentsForm" (ngSubmit)="onAddComment()">
            <input formControlName="content" type="text" placeholder="Comment ...."
                class="w-full outline-none border-0 rounded-3xl text-sm" />
            @if (imagePreview) {
            <div class="flex justify-center my-4 relative">
                <img [src]="imagePreview" class="w-100 max-h-60" alt="image to share">
                <button class="absolute top-0 right-0 cursor-pointer" type="button" (click)="imagePreview = ''">
                    <i class="fas fa-times text-gray-400"></i>
                </button>
            </div>
            }

            <!-- Bottom Row -->
            <div class="flex items-center justify-between mt-2">

                <div class="flex gap-3 text-gray-400 text-sm">

                    <label class="flex items-center gap-2 text-gray-600 cursor-pointer hover:text-green-600">
                        <i class="fa-regular fa-image text-green-600"></i>
                        <span class="text-sm">Photo/video</span>
                        <input (change)="onImageSelect($event)" type="file" accept="image/*" class="hidden">
                    </label>
                </div>

                <button
                    class="w-9 h-9 flex items-center justify-center rounded-full bg-blue-500 text-white hover:bg-blue-600 transition">
                    <i class="fa-solid fa-paper-plane"></i>
                </button>
            </div>
        </form>
    </div>
</div>
