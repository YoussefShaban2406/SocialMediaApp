<div class="max-w-4xl mx-auto bg-white rounded-2xl shadow border border-gray-200 mt-30">

    <!-- Header -->
    <div class="p-6 border-b">

        <div class="flex items-start justify-between">

            <div>
                <h2 class="text-2xl font-bold text-gray-800">Notifications</h2>
                <p class="text-sm text-gray-500 mt-1">
                    Real-time updates for likes, comments, shares, and follows.
                </p>
            </div>

            <button (click)="onMarkAllAsRead()"
                class="flex items-center gap-2 px-4 py-2 rounded-lg border text-gray-600 hover:bg-gray-100 transition">
                <i class="fa-solid fa-check"></i>
                Mark all as read
            </button>

        </div>

        <!-- Tabs -->
        <div class="flex gap-2 mt-4">


            <a routerLink="all-notifications" routerLinkActive="bg-blue-600"
                class="px-4 text-gray-700 py-1.5 rounded-full text-sm font-medium">
                All
            </a>

            <a routerLink="unread-notifications" routerLinkActive="bg-blue-600"
                class="px-4 py-1.5 rounded-full text-gray-700 text-sm font-medium flex items-center gap-2">
                Unread
                <span class="bg-blue-100 text-blue-600 text-xs px-2 py-0.5 rounded-full">
                    {{unreadCounts}}
                </span>
            </a>

        </div>

    </div>

    <div>
        <router-outlet />
    </div>

</div>
